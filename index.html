<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tamil Movie Review Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2333; --border: #30363d;
    --text: #e6edf3; --text-dim: #8b949e; --green: #3fb950; --red: #f85149;
    --yellow: #d29922; --cyan: #58a6ff; --purple: #bc8cff; --accent: #f0883e; --ott: #ff7b72;
    --radius: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
  .container { max-width: 800px; margin: 0 auto; padding: 16px; }

  /* Header */
  .header { text-align: center; padding: 32px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .header h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header .sub { color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; }

  /* Divider */
  .section-divider { display: flex; align-items: center; gap: 12px; margin: 28px 0 16px; color: var(--text-dim); font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-divider .icon { font-size: 1.1rem; }

  /* Back button */
  .back { display: inline-flex; align-items: center; gap: 6px; color: var(--cyan); cursor: pointer; font-size: 0.85rem; margin-bottom: 12px; padding: 6px 12px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); }
  .back:hover { border-color: var(--cyan); }

  /* Card */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 12px; }

  /* Leaderboard row */
  .lb-row {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s;
    border-radius: 8px;
  }
  .lb-row:hover { background: var(--surface2); }
  .lb-row:last-child { border: none; }
  .lb-rank { font-size: 1.2rem; font-weight: 800; color: var(--text-dim); min-width: 32px; text-align: center; }
  .lb-rank.top1 { color: var(--accent); } .lb-rank.top2 { color: var(--cyan); } .lb-rank.top3 { color: var(--purple); }
  .lb-info { flex: 1; }
  .lb-name { font-weight: 600; font-size: 1rem; }
  .lb-meta { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
  .lb-score { font-size: 1.1rem; font-weight: 700; color: var(--green); text-align: right; }
  .lb-rating { font-size: 0.85rem; color: var(--accent); }
  .lb-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); }

  /* 3-tier Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; overflow-x: auto; }
  .tab {
    padding: 10px 16px; border-radius: 8px 8px 0 0; cursor: pointer;
    font-size: 0.82rem; font-weight: 600; white-space: nowrap;
    border: 1px solid var(--border); border-bottom: none;
    background: var(--surface); color: var(--text-dim); transition: all 0.2s; flex: 1; text-align: center;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); background: var(--surface2); border-color: var(--cyan); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Spoiler banners */
  .spoiler-banner {
    padding: 10px 14px; border-radius: 8px; margin-bottom: 16px;
    font-size: 0.82rem; display: flex; align-items: center; gap: 8px;
  }
  .spoiler-banner.none { background: rgba(63,185,80,0.08); border: 1px solid rgba(63,185,80,0.2); color: var(--green); }
  .spoiler-banner.mild { background: rgba(210,153,34,0.08); border: 1px solid rgba(210,153,34,0.2); color: var(--yellow); }
  .spoiler-banner.full { background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.3); color: var(--red); }

  /* Sentiment bar */
  .sentiment-bar { display: flex; height: 28px; border-radius: 6px; overflow: hidden; margin: 8px 0; }
  .sentiment-bar .seg { display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: #fff; }
  .sentiment-bar .pos { background: var(--green); }
  .sentiment-bar .neg { background: var(--red); }
  .sentiment-bar .mix { background: var(--yellow); }
  .sentiment-bar .neu { background: #484f58; }
  .sentiment-labels { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px; margin-top: 4px; font-size: 0.78rem; }
  .sentiment-labels .pos { color: var(--green); } .sentiment-labels .neg { color: var(--red); }
  .sentiment-labels .mix { color: var(--yellow); } .sentiment-labels .neu { color: var(--text-dim); }

  /* Rating big */
  .rating-hero { display: flex; align-items: center; gap: 16px; }
  .rating-num { font-size: 3rem; font-weight: 800; color: var(--accent); line-height: 1; }
  .rating-stars { font-size: 1.2rem; letter-spacing: 2px; color: var(--accent); }
  .rating-label { font-size: 0.82rem; color: var(--text-dim); }

  /* Theme pills */
  .theme-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 5px 12px; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; }
  .pill .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .pill .dot.vh { background: var(--green); } .pill .dot.hi { background: var(--cyan); }
  .pill .dot.md { background: var(--yellow); } .pill .dot.lo { background: var(--text-dim); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .col ul { list-style: none; }
  .col ul li { padding: 6px 0; font-size: 0.85rem; display: flex; align-items: flex-start; gap: 8px; border-bottom: 1px solid var(--border); }
  .col ul li:last-child { border: none; }
  .col ul li::before { content: "\u2705"; flex-shrink: 0; }
  .col.criticize ul li::before { content: "\u274c"; }

  .source-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
  .source-item:last-child { border: none; }
  .source-item a { color: var(--cyan); text-decoration: none; }
  .source-item .count { color: var(--text-dim); font-size: 0.75rem; margin-left: auto; white-space: nowrap; }

  .genres { display: flex; gap: 6px; flex-wrap: wrap; }
  .genres span { background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.25); color: var(--cyan); padding: 3px 10px; border-radius: 12px; font-size: 0.78rem; }

  .buzz-badge { display: inline-block; padding: 4px 12px; border-radius: 16px; font-size: 0.78rem; font-weight: 600; }
  .buzz-explosive { background: rgba(240,136,62,0.2); color: var(--accent); border: 1px solid var(--accent); }
  .buzz-very-high { background: rgba(188,140,255,0.15); color: var(--purple); border: 1px solid var(--purple); }
  .buzz-high { background: rgba(88,166,255,0.12); color: var(--cyan); border: 1px solid var(--cyan); }
  .buzz-medium { background: rgba(210,153,34,0.1); color: var(--yellow); border: 1px solid var(--yellow); }
  .buzz-low { background: rgba(139,148,158,0.1); color: var(--text-dim); border: 1px solid var(--border); }
  .buzz-muted { background: rgba(139,148,158,0.05); color: var(--text-dim); border: 1px dashed var(--border); font-style: italic; }

  .loading { text-align: center; padding: 80px 20px; color: var(--text-dim); }
  .loading .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: var(--red); text-align: center; padding: 40px; }

  .summary-text { font-size: 0.92rem; line-height: 1.7; }
  .vibe-block { background: var(--surface2); border-radius: 8px; padding: 14px; margin: 8px 0; border-left: 3px solid var(--cyan); }

  /* OTT comparison — ALWAYS horizontal */
  .ott-compare-card { background: rgba(255,123,114,0.05); border: 1px solid rgba(255,123,114,0.2); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .ott-compare-card .card-title { color: var(--ott); }
  .rating-compare { display: flex; gap: 16px; align-items: center; flex-direction: row; }
  .rating-box { text-align: center; padding: 12px; border-radius: 8px; flex: 1; min-width: 100px; }
  .rating-box.theatre-box { background: rgba(88,166,255,0.08); border: 1px solid rgba(88,166,255,0.2); }
  .rating-box.ott-box { background: rgba(255,123,114,0.08); border: 1px solid rgba(255,123,114,0.2); }
  .rating-box .label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.05em; }
  .rating-box .value { font-size: 1.8rem; font-weight: 800; margin-top: 4px; }
  .rating-box.theatre-box .value { color: var(--cyan); }
  .rating-box.ott-box .value { color: var(--ott); }
  .vs-badge { font-size: 0.85rem; font-weight: 700; color: var(--text-dim); white-space: nowrap; }

  /* OTT inline detail (inside the card, no tab) */
  .ott-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,123,114,0.15); }
  .ott-detail-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ott); margin-bottom: 8px; font-weight: 600; }
  .ott-mood-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }

  .footer { text-align: center; padding: 24px; color: var(--text-dim); font-size: 0.75rem; }

  @media (max-width: 600px) {
    .container { padding: 12px; }
    .two-col { grid-template-columns: 1fr; }
    .rating-num { font-size: 2.2rem; }
    .tabs { flex-wrap: nowrap; }
    .tab { font-size: 0.75rem; padding: 8px 10px; }
    /* Keep OTT comparison horizontal even on mobile */
    .rating-compare { flex-direction: row; }
    .rating-box { padding: 8px; min-width: 80px; }
    .rating-box .value { font-size: 1.4rem; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading"><div class="spinner"></div><div>Loading...</div></div>
</div>

<script>
// ─── Config ─────────────────────────────────────────────────────────
const VPS_IP = "http://84.247.164.29:8080";
const TUNNEL_URL = "https://besides-irrigation-dynamic-girls.trycloudflare.com";
// On HTTPS pages (Vercel), use the tunnel URL immediately (synchronous)
// On HTTP pages (VPS direct), API_BASE stays "" for same-origin calls
let API_BASE = window.location.protocol === 'https:' ? TUNNEL_URL : "";
const API_KEY  = "__VITE_API_KEY__";
const API_HEADERS = API_KEY && API_KEY.startsWith("__VITE") ? {} : { "X-API-Key": API_KEY };

// Auto-discover tunnel URL (non-blocking, updates API_BASE if found)
(async function discoverTunnel() {
  try {
    const r = await fetch(`${VPS_IP}/api/tunnel-url`, { signal: AbortSignal.timeout(5000) });
    const data = await r.json();
    if (data.url) API_BASE = data.url;
  } catch(e) {
    // mixed content from HTTPS page — fallback already set above
  }
})();

function route() {
  const hash = window.location.hash || '#/';
  if (hash.startsWith('#/film/')) {
    const film = decodeURIComponent(hash.replace('#/film/', ''));
    showFilm(film);
  } else {
    showLeaderboard();
  }
}

window.addEventListener('hashchange', route);

// ─── Helpers ─────────────────────────────────────────────────────────
function esc(s) { if (!s) return ''; return String(s).replace(/[&<>"']/g, function(m) {
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; }); }

function buzzClass(level) {
  const map = {'explosive':'explosive','very high':'very-high','high':'high','medium':'medium','low':'low','muted':'muted'};
  return 'buzz-' + (map[String(level).toLowerCase()] || 'medium');
}

function freqDot(f) {
  const map = {'very high':'vh','high':'hi','medium':'md','low':'lo'};
  return map[f.toLowerCase()] || 'md';
}

// ─── Leaderboard + OTT (scroll-down) ────────────────────────────────
async function showLeaderboard() {
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading...</div></div>';
  try {
    const [lbRes, nrRes, ottRes] = await Promise.all([
      fetch(`${API_BASE}/api/leaderboard`, { headers: API_HEADERS }),
      fetch(`${API_BASE}/api/new-releases`, { headers: API_HEADERS }),
      fetch(`${API_BASE}/api/ott-watch`, { headers: API_HEADERS }),
    ]);
    const films = await lbRes.json();
    const newReleases = await nrRes.json();
    const ottFilms = await ottRes.json();
    renderDashboard(films, newReleases, ottFilms);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="error-msg">⚠️ ${esc(e.message)}</div>`;
  }
}

function renderDashboard(films, newReleases, ottFilms) {
  if ((!films || films.length === 0) && (!newReleases || newReleases.length === 0) && (!ottFilms || ottFilms.length === 0)) {
    document.getElementById('app').innerHTML = '<div class="error-msg">No films tracked yet.</div>';
    return;
  }

  let html = `
    <div class="header">
      <h1>🎬 Kollywood Pulse</h1>
      <div class="sub">Social media review dashboard — Top films by public discussion</div>
    </div>
  `;

  // ── SECTION 1: THEATRICAL LEADERBOARD ─────────────────────────
  html += `<div class="card" style="padding:8px">`;
  if (films && films.length > 0) {
    films.forEach((f, i) => {
      const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
      const buzz = f.buzz || '';
      const buzzHtml = buzz ? `<span class="buzz-badge ${buzzClass(buzz)}">${esc(buzz)}</span>` : '';
      const ratingHtml = f.rating ? `<span class="lb-rating">⭐ ${f.rating}</span>` : '';
      const genreHtml = (f.genre || []).map(g => `<span class="lb-tag">${esc(g)}</span>`).join('');

      html += `
        <div class="lb-row" onclick="window.location.hash='#/film/${encodeURIComponent(f.film)}'">
          <div class="lb-rank ${rankClass}">${i + 1}</div>
          <div class="lb-info">
            <div class="lb-name">${esc(f.film)}</div>
            <div class="lb-meta">
              ${ratingHtml}
              ${buzzHtml}
              ${genreHtml}
              <span>💬 ${f.total_comments || 0}</span>
            </div>
          </div>
          <div class="lb-score">${f.popularity_score || 0}</div>
        </div>
      `;
    });
  } else {
    html += `<p style="color:var(--text-dim);text-align:center;padding:20px">No films on leaderboard right now.</p>`;
  }
  html += `</div>`;

  // ── SECTION 2: NEW RELEASES (only if any) ─────────────────────
  if (newReleases && newReleases.length > 0) {
    html += `
      <div class="section-divider"><span class="icon">⭐</span> New Releases <span class="icon">⭐</span></div>
      <p style="font-size:0.82rem;color:var(--text-dim);margin:-8px 0 14px">Freshly released — gathering audience reactions</p>
      <div class="card" style="padding:8px">
    `;
    newReleases.forEach((f, i) => {
      const buzz = f.buzz || '';
      const buzzHtml = buzz ? `<span class="buzz-badge ${buzzClass(buzz)}">${esc(buzz)}</span>` : '';
      const ratingHtml = f.rating ? `<span class="lb-rating">⭐ ${f.rating}</span>` : '';

      html += `
        <div class="lb-row" onclick="window.location.hash='#/film/${encodeURIComponent(f.film)}'">
          <div class="lb-rank">#</div>
          <div class="lb-info">
            <div class="lb-name">${esc(f.film)}</div>
            <div class="lb-meta">
              ${ratingHtml}
              ${buzzHtml}
              <span>💬 ${f.total_comments || 0}</span>
              <span class="lb-tag" style="border-color:var(--accent);color:var(--accent)">NEW</span>
            </div>
          </div>
          <div class="lb-score">—</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  // ── SECTION 3: OTT RELEASE BOARD (matches leaderboard format) ──
  if (ottFilms && ottFilms.length > 0) {
    html += `
      <div class="section-divider"><span class="icon">📺</span> OTT Release Board <span class="icon">📺</span></div>
      <p style="font-size:0.82rem;color:var(--text-dim);margin:-8px 0 14px">Post-theatrical discussion — how the vibe shifts at home</p>
      <div class="card" style="padding:8px">
    `;
    ottFilms.forEach((f, i) => {
      const buzz = f.ott_mood || '';
      const buzzHtml = buzz ? `<span class="buzz-badge ${buzzClass(buzz)}">${esc(buzz)}</span>` : '';
      const ratingHtml = f.rating ? `<span class="lb-rating">⭐ ${f.rating}</span>` : '';
      const theatreCompare = f.theatrical_rating ? `<span class="lb-tag" style="border-color:rgba(88,166,255,0.4);color:var(--cyan)">🎬 ${f.theatrical_rating}</span>` : '';
      const ottDate = f.ott_release_date ? `<span class="lb-tag" style="border-color:rgba(255,123,114,0.3);color:var(--ott)">📺 ${f.ott_release_date}</span>` : '';

      html += `
        <div class="lb-row" onclick="window.location.hash='#/film/${encodeURIComponent(f.film)}'">
          <div class="lb-rank" style="color:var(--ott)">${i + 1}</div>
          <div class="lb-info">
            <div class="lb-name">${esc(f.film)}</div>
            <div class="lb-meta">
              ${ratingHtml}
              ${buzzHtml}
              ${theatreCompare}
              ${ottDate}
              <span>💬 ${f.ott_comments || 0}</span>
            </div>
          </div>
          <div class="lb-score" style="color:var(--ott)">${f.ott_score || 0}</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  html += `
    <div class="footer">
      Data refreshes every 6 hours · Powered by YouTube API + OpenRouter
      <br><span style="font-size:0.7rem;color:var(--text-dim)">Click any film for detailed analysis</span>
    </div>`;

  document.getElementById('app').innerHTML = html;
}

// ─── Film Detail ─────────────────────────────────────────────────────
async function showFilm(film) {
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading analysis...</div></div>';
  try {
    const r = await fetch(`${API_BASE}/api/film/${encodeURIComponent(film)}`, { headers: API_HEADERS });
    const data = await r.json();
    renderFilm(film, data);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="error-msg">⚠️ ${esc(e.message)}</div>`;
  }
}

function renderFilm(film, data) {
  const a = data.analysis || {};
  const sb = a.sentiment_breakdown || {};
  const tab0 = a.tab_zero_spoiler || {};
  const tab1 = a.tab_mild_spoiler || {};
  const tab2 = a.tab_full_spoiler || {};
  const ottAnalysis = data.ott_analysis || {};
  const ottStatus = data.ott_status || {};
  const hasOtt = ottStatus.has_ott_analysis && Object.keys(ottAnalysis).length > 0;
  const total = data.total_comments || 0;
  const videos = data.videos || [];
  const rating = a.rating || '—';

  const stars = "★".repeat(Math.min(10, Math.floor(rating))) + "☆".repeat(Math.max(0, 10 - Math.floor(rating)));
  const buzz = tab0.audience_mood || '';
  const buzzHtml = buzz ? `<span class="buzz-badge ${buzzClass(buzz)}">${esc(buzz)}</span>` : '';

  const themeHtml = (a.top_themes || []).map(t =>
    `<span class="pill"><span class="dot ${freqDot(t.frequency)}"></span>${esc(t.theme)} ${t.sentiment === 'positive' ? '😊' : t.sentiment === 'negative' ? '😠' : '🤔'}</span>`
  ).join('');

  const lovedHtml = (a.what_people_loved || []).map(l => `<li>${esc(l)}</li>`).join('');
  const critHtml = (a.what_people_criticized || []).map(c => `<li>${esc(c)}</li>`).join('');

  const videoHtml = videos.map(v =>
    `<div class="source-item">
      <span>▶️</span>
      <a href="${esc(v.url)}" target="_blank">${esc(v.title || '')}</a>
      ${v.is_ott ? `<span class="lb-tag" style="border-color:rgba(255,123,114,0.3);color:var(--ott)">OTT</span>` : ''}
      <span class="count">${v.comment_count || 0} comments</span>
    </div>`
  ).join('');

  const genreHtml = (a.genre || []).map(g => `<span>${esc(g)}</span>`).join('');

  // Comparisons
  const comps = a.audience_engagement?.comparisons || [];
  const compHtml = comps.length ? comps.map(c => `<li style="padding:6px 0;font-size:0.85rem;border-bottom:1px solid var(--border)">🔗 ${esc(c)}</li>`).join('') : '';

  // OTT analysis inline data
  const ottSb = ottAnalysis.sentiment_breakdown || {};
  const ottThemeHtml = (ottAnalysis.top_themes || []).map(t =>
    `<span class="pill"><span class="dot ${freqDot(t.frequency)}"></span>${esc(t.theme)} ${t.sentiment === 'positive' ? '😊' : t.sentiment === 'negative' ? '😠' : '🤔'}</span>`
  ).join('');
  const ottLovedHtml = (ottAnalysis.what_people_loved || []).map(l => `<li>${esc(l)}</li>`).join('');
  const ottCritHtml = (ottAnalysis.what_people_criticized || []).map(c => `<li>${esc(c)}</li>`).join('');
  const ottRating = ottAnalysis.rating || null;
  const ottVibe = ottAnalysis.ott_vibe || {};
  const ottTab0 = ottAnalysis.tab_zero_spoiler || {};

  if (hasOtt) {
    // ─── OTT MODE: Single scrollable view, no spoiler tabs ─────────
    document.getElementById('app').innerHTML = `
    <button class="back" onclick="window.location.hash='#/'">← Back</button>

    <button class="back" onclick="window.location.hash='#/'">← Back</button>

          <div class="seg pos" style="width:${sb.positive_percent || 0}%">${(sb.positive_percent || 0) > 8 ? (sb.positive_percent + '%') : ''}</div>

            <div class="rating-label">From ${total} YouTube comments</div>

      </div>

      ${tab0.performance_highlights ? `
      <div class="card">

      ${tab0.technical_highlights ? `

          ${lovedHtml ? `<div class="col"><strong style="color:var(--green)">Loved</strong><ul>${lovedHtml}</ul></div>` : ''}
          ${critHtml ? `<div class="col criticize"><strong style="color:var(--red)">Criticized</strong><ul>${critHtml}</ul></div>` : ''}

      ${tab1.second_half_vibe ? `
      <div class="card">
        <div class="card-title">🎬 Second Half Vibe</div>
        <p class="summary-text">${esc(tab1.second_half_vibe)}</p>
      </div>` : ''}

      ${tab1.uniqueness ? `
      <div class="card">
        <div class="card-title">💎 What Makes It Unique</div>
        <p class="summary-text">${esc(tab1.uniqueness)}</p>
      </div>` : ''}

      ${tab1.why_watch ? `
      <div class="card">
        <div class="card-title">🎯 Why Watch (Audience Opinion)</div>

          ${(a.what_people_criticized || []).map(c => `<li style="padding:6px 0;font-size:0.85rem;border-bottom:1px solid var(--border)">❌ ${esc(c)}</li>`).join('')}
        </ul>

    <!-- TAB 2: FULL SPOILER -->
    <div id="tab-full" class="tab-content">

      ${(tab2.audience_reaction_highlights || []).length ? `
      <div class="card">
        <div class="card-title">🔥 Audience Reaction Highlights</div>
        <ul style="list-style:none">
          ${tab2.audience_reaction_highlights.map(s => `<li style="padding:8px 0;font-size:0.85rem;border-bottom:1px solid var(--border)">💬 ${esc(s)}</li>`).join('')}

      · Built with YouTube Data API + OpenRouter
    </div>
  `;
  }

// ─── Tab Switcher ───────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const tab = document.getElementById('tab-' + name);
  if (tab) tab.classList.add('active');
}

// ─── Start ──────────────────────────────────────────────────────────
route();
</script>
