<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kollywood Pulse — Movie Review Dashboard</title>
<script>
// ─── 🔧 SET YOUR VPS API URL HERE ─────────────────────────
// Deploy this to Vercel/Netlify. Change API_BASE to your VPS.
const API_BASE = '__VITE_API_BASE__'; // replaced at build time by Vercel env
const API_KEY  = '__VITE_API_KEY__';  // replaced at build time by Vercel env
const API_HEADERS = API_KEY ? { 'X-API-Key': API_KEY } : {};
// For VPS backend, set: const API_BASE = "https://your-vps-ip:8080";
// ───────────────────────────────────────────────────────────
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --surface: #f6f8fa; --surface2: #eef1f5; --border: #d0d7de;
    --text: #1f2328; --text-dim: #656d76; --green: #1a7f37; --red: #cf222e;
    --yellow: #9a6700; --cyan: #0969da; --purple: #8250df; --accent: #d14d16;
    --radius: 12px;
  }
  .dark-mode {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2333; --border: #30363d;
    --text: #e6edf3; --text-dim: #8b949e; --green: #3fb950; --red: #f85149;
    --yellow: #d29922; --cyan: #58a6ff; --purple: #bc8cff; --accent: #f0883e;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
  .container { max-width: 800px; margin: 0 auto; padding: 16px; }
  .header { text-align: center; padding: 32px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .header h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header .sub { color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; }
  .back { display: inline-flex; align-items: center; gap: 6px; color: var(--cyan); cursor: pointer; font-size: 0.85rem; margin-bottom: 12px; padding: 6px 12px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); }
  .back:hover { border-color: var(--cyan); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 12px; }

  /* Leaderboard */
  .lb-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; border-radius: 8px; }
  .lb-row:hover { background: var(--surface2); }
  .lb-row:last-child { border: none; }
  .lb-rank { font-size: 1.2rem; font-weight: 800; color: var(--text-dim); min-width: 32px; text-align: center; }
  .lb-rank.top1 { color: var(--accent); } .lb-rank.top2 { color: var(--cyan); } .lb-rank.top3 { color: var(--purple); }
  .lb-info { flex: 1; }
  .lb-name { font-weight: 600; font-size: 1rem; }
  .lb-meta { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
  .lb-score { font-size: 1.1rem; font-weight: 700; color: var(--green); text-align: right; }
  .lb-rating { font-size: 0.85rem; color: var(--accent); }
  .lb-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; overflow-x: auto; }
  .tab { padding: 10px 16px; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 0.82rem; font-weight: 600; white-space: nowrap; border: 1px solid var(--border); border-bottom: none; background: var(--surface); color: var(--text-dim); transition: all 0.2s; flex: 1; text-align: center; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); background: var(--surface2); border-color: var(--cyan); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Spoiler banners */
  .spoiler-banner { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 0.82rem; display: flex; align-items: center; gap: 8px; }
  .spoiler-banner.none { background: rgba(63,185,80,0.08); border: 1px solid rgba(63,185,80,0.2); color: var(--green); }
  .spoiler-banner.mild { background: rgba(210,153,34,0.08); border: 1px solid rgba(210,153,34,0.2); color: var(--yellow); }
  .spoiler-banner.full { background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.3); color: var(--red); }

  /* Sentiment bar */
  .sentiment-bar { display: flex; height: 28px; border-radius: 6px; overflow: hidden; margin: 8px 0; }
  .sentiment-bar .seg { display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: #fff; }
  .sentiment-bar .pos { background: var(--green); }
  .sentiment-bar .neg { background: var(--red); }
  .sentiment-bar .mix { background: var(--yellow); }
  .sentiment-bar .neu { background: #484f58; }
  .sentiment-labels { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px; margin-top: 4px; font-size: 0.78rem; }
  .sentiment-labels .pos { color: var(--green); } .sentiment-labels .neg { color: var(--red); }
  .sentiment-labels .mix { color: var(--yellow); } .sentiment-labels .neu { color: var(--text-dim); }

  .rating-hero { display: flex; align-items: center; gap: 16px; }
  .rating-num { font-size: 3rem; font-weight: 800; color: var(--accent); line-height: 1; }
  .rating-stars { font-size: 1.2rem; letter-spacing: 2px; color: var(--accent); }
  .rating-label { font-size: 0.82rem; color: var(--text-dim); }

  .theme-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 5px 12px; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; }
  .pill .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .pill .dot.vh { background: var(--green); } .pill .dot.hi { background: var(--cyan); } .pill .dot.md { background: var(--yellow); } .pill .dot.lo { background: var(--text-dim); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .col ul { list-style: none; }
  .col ul li { padding: 6px 0; font-size: 0.85rem; display: flex; align-items: flex-start; gap: 8px; border-bottom: 1px solid var(--border); }
  .col ul li:last-child { border: none; }
  .col ul li::before { content: "✅"; flex-shrink: 0; }
  .col.criticize ul li::before { content: "❌"; }

  .source-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
  .source-item:last-child { border: none; }
  .source-item a { color: var(--cyan); text-decoration: none; }
  .source-item .count { color: var(--text-dim); font-size: 0.75rem; margin-left: auto; white-space: nowrap; }

  .genres { display: flex; gap: 6px; flex-wrap: wrap; }
  .genres span { background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.25); color: var(--cyan); padding: 3px 10px; border-radius: 12px; font-size: 0.78rem; }

  .buzz-badge { display: inline-block; padding: 4px 12px; border-radius: 16px; font-size: 0.78rem; font-weight: 600; }
  .buzz-muted { background: rgba(139,148,158,0.08); color: var(--text-dim); border: 1px solid var(--border); font-style: italic; }
  .buzz-celebratory { background: rgba(240,136,62,0.2); color: var(--accent); border: 1px solid var(--accent); }
  .buzz-excited { background: rgba(188,140,255,0.15); color: var(--purple); border: 1px solid var(--purple); }
  .buzz-mixed { background: rgba(210,153,34,0.1); color: var(--yellow); border: 1px solid var(--yellow); }
  .buzz-disappointed { background: rgba(248,81,73,0.1); color: var(--red); border: 1px solid var(--red); }
  .buzz-explosive { background: rgba(240,136,62,0.2); color: var(--accent); border: 1px solid var(--accent); }
  .buzz-very-high { background: rgba(188,140,255,0.15); color: var(--purple); border: 1px solid var(--purple); }
  .buzz-high { background: rgba(88,166,255,0.12); color: var(--cyan); border: 1px solid var(--cyan); }
  .buzz-medium { background: rgba(210,153,34,0.1); color: var(--yellow); border: 1px solid var(--yellow); }
  .buzz-low { background: rgba(139,148,158,0.1); color: var(--text-dim); border: 1px solid var(--border); }

  .loading { text-align: center; padding: 80px 20px; color: var(--text-dim); }
  .loading .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: var(--red); text-align: center; padding: 40px; }

  .summary-text { font-size: 0.92rem; line-height: 1.7; }
  .vibe-block { background: var(--surface2); border-radius: 8px; padding: 14px; margin: 8px 0; border-left: 3px solid var(--cyan); }
  .footer { text-align: center; padding: 24px; color: var(--text-dim); font-size: 0.75rem; }

  @media (max-width: 600px) {
    .container { padding: 12px; }
    .two-col { grid-template-columns: 1fr; }
    .rating-num { font-size: 2.2rem; }
    .tabs { flex-wrap: nowrap; }
    .tab { font-size: 0.75rem; padding: 8px 10px; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading"><div class="spinner"></div><div>Loading...</div></div>
</div>

<script>
// ─── Theme ───────────────────────────────────────────────
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'dark') document.body.classList.add('dark-mode');
function toggleTheme() {
  document.body.classList.toggle('dark-mode');
  localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
}

// ─── Router ───────────────────────────────────────────────
function route() {
  const hash = window.location.hash || '#/';
  if (hash.startsWith('#/film/')) {
    const film = decodeURIComponent(hash.replace('#/film/', ''));
    showFilm(film);
  } else {
    showLeaderboard();
  }
}
window.addEventListener('hashchange', route);

function esc(s) { if (!s) return ''; return String(s).replace(/[&<>"']/g, function(m) {
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; }); }

function buzzClass(level) {
  const map = {'explosive':'explosive','very high':'very-high','high':'high','medium':'medium','low':'low','muted':'muted','celebratory':'celebratory','excited':'excited','mixed':'mixed','disappointed':'disappointed'};
  return 'buzz-' + (map[String(level).toLowerCase()] || 'medium');
}

function freqDot(f) {
  const map = {'very high':'vh','high':'hi','medium':'md','low':'lo'};
  return map[f.toLowerCase()] || 'md';
}

// ─── Leaderboard ──────────────────────────────────────────
async function showLeaderboard() {
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading leaderboard...</div></div>';
  try {
    const [lb, nr] = await Promise.all([
      fetch(`${API_BASE}/api/leaderboard`, { headers: API_HEADERS }).then(r => r.json()),
      fetch(`${API_BASE}/api/new-releases`, { headers: API_HEADERS }).then(r => r.json()),
    ]);
    renderLeaderboard(lb, nr);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="error-msg">⚠️ Could not reach backend. Is the VPS running?</div>`;
  }
}

function renderLeaderboard(films, newReleases) {
  if (!films || films.length === 0) {
    document.getElementById('app').innerHTML = '<div class="error-msg">No films tracked yet.</div>';
    return;
  }
  let html = `
    <div class="header">
      <h1>🎬 Kollywood Pulse</h1>
      <div class="sub">Social review dashboard — Top films by public discussion</div>
      <div style="margin-top:8px"><button onclick="toggleTheme()" style="background:var(--surface);color:var(--text-dim);border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-size:0.78rem;cursor:pointer">🌙 Dark / ☀️ Light</button></div>
    </div>`;

  // ─── Main Leaderboard ───
  html += `<div class="card" style="padding:8px"><div class="card-title" style="padding:12px 16px 0">🔥 Leaderboard</div>`;
  films.forEach((f, i) => {
    const rc = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    const buzz = f.buzz || '';
    const bHtml = buzz ? `<span class="buzz-badge ${buzzClass(buzz)}">🔥 ${esc(buzz)}</span>` : '';
    const rHtml = f.rating ? `<span class="lb-rating">⭐ ${f.rating}</span>` : '';
    const gHtml = (f.genre || []).map(g => `<span class="lb-tag">${esc(g)}</span>`).join('');
    const dHtml = f.release_date ? `<span class="lb-tag">📅 ${f.release_date}</span>` : '';
    html += `<div class="lb-row" onclick="window.location.hash='#/film/${encodeURIComponent(f.film)}'">
      <div class="lb-rank ${rc}">${i + 1}</div>
      <div class="lb-info">
        <div class="lb-name">${esc(f.film)}</div>
        <div class="lb-meta">${rHtml} ${bHtml} ${gHtml} ${dHtml} <span>💬 ${f.total_comments || 0}</span></div>
      </div>
      <div class="lb-score">${f.hotness_score || 0}</div>
    </div>`;
  });
  html += `</div>`;

  // ─── New Releases ───
  if (newReleases && newReleases.length > 0) {
    html += `<div class="card" style="padding:8px;margin-top:12px"><div class="card-title" style="padding:12px 16px 0">🆕 New Releases</div>`;
    newReleases.forEach((f, i) => {
      const rHtml = f.rating ? `<span class="lb-rating">⭐ ${f.rating}</span>` : '';
      const buzz = f.buzz || '';
      const bHtml = buzz ? `<span class="buzz-badge ${buzzClass(buzz)}">🔥 ${esc(buzz)}</span>` : '';
      const sHtml = f.star ? `<span class="lb-tag">🎭 ${esc(f.star)}</span>` : '';
      const dHtml = f.release_date ? `<span class="lb-tag">📅 ${f.release_date}</span>` : '';
      html += `<div class="lb-row" onclick="window.location.hash='#/film/${encodeURIComponent(f.film)}'">
        <div class="lb-rank" style="color:var(--cyan);font-size:0.9rem">🆕</div>
        <div class="lb-info">
          <div class="lb-name">${esc(f.film)}</div>
          <div class="lb-meta">${sHtml} ${dHtml} ${rHtml} ${bHtml} <span>💬 ${f.total_comments || 0}</span></div>
        </div>
        <div class="lb-score" style="font-size:0.85rem;color:var(--text-dim)">${f.popularity_score || '—'}</div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="footer">Data refreshes every 6 h · <a href="https://github.com/tharunsuresh-code/movies-vibe-dashboard" style="color:var(--cyan)">GitHub</a></div>`;
  document.getElementById('app').innerHTML = html;
}

// ─── Film Detail ──────────────────────────────────────────
async function showFilm(film) {
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading analysis...</div></div>';
  try {
    const r = await fetch(`${API_BASE}/api/film/${encodeURIComponent(film)}`, { headers: API_HEADERS });
    const data = await r.json();
    renderFilm(film, data);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="error-msg">⚠️ ${esc(e.message)}</div>`;
  }
}

function renderFilm(film, data) {
  const a = data.analysis || {};
  const sb = a.sentiment_breakdown || {};
  const t0 = a.tab_zero_spoiler || {};
  const t1 = a.tab_mild_spoiler || {};
  const t2 = a.tab_full_spoiler || {};
  const total = data.total_comments || 0;
  const videos = data.videos || [];
  const rating = a.rating || '—';
  const stars = "★".repeat(Math.min(10, Math.floor(rating))) + "☆".repeat(Math.max(0, 10 - Math.floor(rating)));
  const buzz = a.popularity_metrics?.buzz_level || '';
  const bHtml = buzz ? `<span class="buzz-badge ${buzzClass(buzz)}">🔥 ${esc(buzz)}</span>` : '';
  const themeHtml = (a.top_themes || []).map(t =>
    `<span class="pill"><span class="dot ${freqDot(t.frequency)}"></span>${esc(t.theme)} ${t.sentiment === 'positive' ? '😊' : t.sentiment === 'negative' ? '😠' : '🤔'}</span>`
  ).join('');
  const lovedHtml = (a.what_people_loved || []).map(l => `<li>${esc(l)}</li>`).join('');
  const critHtml = (a.what_people_criticized || []).map(c => `<li>${esc(c)}</li>`).join('');
  const videoHtml = videos.map(v =>
    `<div class="source-item"><span>▶️</span><a href="${esc(v.url)}" target="_blank">${esc(v.title || '')}</a><span class="count">${v.comment_count || 0} comments</span></div>`
  ).join('');
  const genreHtml = (a.genre || []).map(g => `<span>${esc(g)}</span>`).join('');
  const comps = a.audience_engagement?.comparisons || [];
  const compHtml = comps.length ? comps.map(c => `<li style="padding:6px 0;font-size:0.85rem;border-bottom:1px solid var(--border)">🔗 ${esc(c)}</li>`).join('') : '';

  document.getElementById('app').innerHTML = `
    <button class="back" onclick="window.location.hash='#/'">← Leaderboard</button>
    <div class="header" style="padding-top:8px;border:none">
      <h1 style="font-size:1.5rem;background:none;-webkit-text-fill-color:var(--text)">🎬 ${esc(film)}</h1>
      <div class="sub" style="margin-top:8px">${genreHtml} ${bHtml} <span style="color:var(--text-dim);margin-left:8px">💬 ${total} · ${videos.length} videos</span></div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('zero', this)">🟢 Zero Spoiler</div>
      <div class="tab" onclick="switchTab('mild', this)">🟡 Mild Spoiler</div>
      <div class="tab" onclick="switchTab('full', this)">🔴 Full Spoiler</div>
    </div>

    <!-- TAB 0 -->
    <div id="tab-zero" class="tab-content active">
      <div class="spoiler-banner none">✅ No spoilers — safe to share</div>
      <div class="card">
        <div class="card-title">🎭 Audience Vibe</div>
        <div class="vibe-block">${esc(t0.vibe_summary || a.summary || '')}</div>
        ${t0.audience_mood ? `<div style="margin-top:8px">Mood: <span class="buzz-badge ${buzzClass(t0.audience_mood)}">${esc(t0.audience_mood)}</span></div>` : ''}
        ${t0.who_should_watch ? `<p style="margin-top:8px;font-size:0.85rem;color:var(--text-dim)">🎯 ${esc(t0.who_should_watch)}</p>` : ''}
      </div>
      ${t0.performance_highlights ? `<div class="card"><div class="card-title">🎭 Performance Highlights</div><p class="summary-text">${esc(t0.performance_highlights)}</p></div>` : ''}
      ${t0.technical_highlights ? `<div class="card"><div class="card-title">🎬 Technical Highlights</div><p class="summary-text">${esc(t0.technical_highlights)}</p></div>` : ''}
      <div class="card">
        <div class="card-title">📊 Sentiment</div>
        <div class="sentiment-bar">
          <div class="seg pos" style="width:${sb.positive_percent || 0}%">${(sb.positive_percent || 0) > 8 ? (sb.positive_percent + '%') : ''}</div>
          <div class="seg mix" style="width:${sb.mixed_percent || 0}%">${(sb.mixed_percent || 0) > 8 ? (sb.mixed_percent + '%') : ''}</div>
          <div class="seg neg" style="width:${sb.negative_percent || 0}%">${(sb.negative_percent || 0) > 8 ? (sb.negative_percent + '%') : ''}</div>
          <div class="seg neu" style="width:${sb.neutral_percent || 0}%"></div>
        </div>
        <div class="sentiment-labels"><span class="pos">😊 ${sb.positive_percent || 0}%</span><span class="mix">🤔 ${sb.mixed_percent || 0}%</span><span class="neg">😠 ${sb.negative_percent || 0}%</span><span class="neu">😶 ${sb.neutral_percent || 0}%</span></div>
      </div>
      <div class="card">
        <div class="card-title">⭐ Rating</div>
        <div class="rating-hero"><div class="rating-num">${rating}</div><div><div class="rating-stars">${stars}</div><div class="rating-label">From ${total} YouTube comments</div></div></div>
      </div>
      ${themeHtml ? `<div class="card"><div class="card-title">🔍 Key Themes</div><div class="theme-pills">${themeHtml}</div></div>` : ''}
      ${lovedHtml || critHtml ? `<div class="card"><div class="card-title">❤️ What People Say</div><div class="two-col">${lovedHtml ? `<div class="col"><strong style="color:var(--green)">Loved</strong><ul>${lovedHtml}</ul></div>` : ''}${critHtml ? `<div class="col criticize"><strong style="color:var(--red)">Criticized</strong><ul>${critHtml}</ul></div>` : ''}</div></div>` : ''}
      ${compHtml ? `<div class="card"><div class="card-title">🎬 Compared To</div><ul style="list-style:none">${compHtml}</ul></div>` : ''}
      ${videoHtml ? `<div class="card"><div class="card-title">📺 Sources</div>${videoHtml}</div>` : ''}
    </div>

    <!-- TAB 1 -->
    <div id="tab-mild" class="tab-content">
      <div class="spoiler-banner mild">🟡 Mild spoilers — structure/context, no major plot points</div>
      ${t1.first_half_vibe ? `<div class="card"><div class="card-title">🎬 First Half</div><p class="summary-text">${esc(t1.first_half_vibe)}</p></div>` : ''}
      ${t1.second_half_vibe ? `<div class="card"><div class="card-title">🎬 Second Half</div><p class="summary-text">${esc(t1.second_half_vibe)}</p></div>` : ''}
      ${t1.uniqueness ? `<div class="card"><div class="card-title">✨ What Makes It Unique</div><p class="summary-text">${esc(t1.uniqueness)}</p></div>` : ''}
      ${t1.why_watch ? `<div class="card"><div class="card-title">🎯 Why Watch</div><p class="summary-text">${esc(t1.why_watch)}</p></div>` : ''}
      ${!t1.first_half_vibe && t1.character_context ? `<div class="card"><div class="card-title">🧩 Story Structure</div><p class="summary-text">${esc(t1.character_context)}</p></div>` : ''}
    </div>

    <!-- TAB 2 -->
    <div id="tab-full" class="tab-content">
      <div class="spoiler-banner full">🔴 Full spoilers — audience reactions revealing plot context</div>
      ${(t2.audience_reaction_highlights || []).length ? `<div class="card"><div class="card-title">💬 Audience Reaction Highlights</div><ul style="list-style:none">${t2.audience_reaction_highlights.map(s => `<li style="padding:8px 0;border-bottom:1px solid var(--border)">💬 ${esc(s)}</li>`).join('')}</ul></div>` : ''}
      ${!t2.audience_reaction_highlights && t2.story_breakdown ? `<div class="card"><div class="card-title">📖 Story Context</div><p class="summary-text">${esc(t2.story_breakdown)}</p></div>` : ''}
      ${!t2.audience_reaction_highlights && t2.key_scenes ? `<div class="card"><div class="card-title">🎬 Key Scenes Discussion</div><ul style="list-style:none">${(Array.isArray(t2.key_scenes) ? t2.key_scenes : [t2.key_scenes]).map(s => `<li style="padding:6px 0;border-bottom:1px solid var(--border)">🔑 ${esc(s)}</li>`).join('')}</ul></div>` : ''}
      ${t2.climax_analysis ? `<div class="card"><div class="card-title">🔥 Climax Analysis</div><p class="summary-text">${esc(t2.climax_analysis)}</p></div>` : ''}
      ${t2.technical_breakdown ? `<div class="card"><div class="card-title">⚙️ Technical</div><p class="summary-text">${esc(t2.technical_breakdown)}</p></div>` : ''}
      ${a.audience_engagement?.theatre_response ? `<div class="card"><div class="card-title">🏟️ Theatre Response</div><p class="summary-text">${esc(a.audience_engagement.theatre_response)}</p></div>` : ''}
    </div>

    <div class="footer">Fetched: ${new Date(data.fetched_at || Date.now()).toLocaleString()} · YouTube API + OpenRouter</div>`;
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const tab = document.getElementById('tab-' + name);
  if (tab) tab.classList.add('active');
}

route();
</script>
</body>
</html>
