<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tamil Movie Review Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  :root {
    --bg: #f8f9fa; --surface: #ffffff; --surface2: #f0f2f5; --border: #e1e4e8;
    --text: #1f2328; --text-dim: #656d76; --green: #1a7f37; --red: #cf222e;
    --yellow: #9a6700; --cyan: #0969da; --purple: #8250df; --accent: #bc4c00;
    --radius: 12px;
    --shadow-hover: 0 2px 12px rgba(0,0,0,0.06);
  }
  [data-theme="dark"] {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2333; --border: #30363d;
    --text: #e6edf3; --text-dim: #8b949e; --green: #3fb950; --red: #f85149;
    --yellow: #d29922; --cyan: #58a6ff; --purple: #bc8cff; --accent: #f0883e;
    --shadow-hover: 0 2px 12px rgba(0,0,0,0.3);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; transition: background 0.3s, color 0.3s; }
  .container { max-width: 800px; margin: 0 auto; padding: 16px; }

  /* Theme toggle button */
  .theme-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 1000;
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    font-size: 1.2rem; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: all 0.3s;
    display: flex; align-items: center; justify-content: center;
  }
  .theme-toggle:hover { box-shadow: var(--shadow-hover); transform: scale(1.05); }

  /* Header */
  .header { text-align: center; padding: 32px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .header h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header .sub { color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; }

  /* Divider */
  .section-divider { display: flex; align-items: center; gap: 12px; margin: 28px 0 16px; color: var(--text-dim); font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-divider .icon { font-size: 1.1rem; }

  /* Back button */
  .back { display: inline-flex; align-items: center; gap: 6px; color: var(--cyan); cursor: pointer; font-size: 0.85rem; margin-bottom: 12px; padding: 6px 12px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); min-height: 44px; }
  .back:hover { border-color: var(--cyan); }

  /* Card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; transition: box-shadow 0.2s; }
  .card:hover { box-shadow: var(--shadow-hover); }
  .card-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 12px; }

  /* Leaderboard row */
  .lb-row {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s, border-left 0.15s;
    border-radius: 8px; border-left: 3px solid transparent;
  }
  .lb-row:hover { background: var(--surface2); border-left-color: var(--accent); }
  .lb-row:last-child { border-bottom: none; }
  .lb-header { display: flex; align-items: center; gap: 12px; padding: 4px 8px 4px 55px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
  .lb-header-label { font-size: 0.72rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; flex: 1; }
  .lb-header-label:last-child { flex: 0 0 auto; min-width: 50px; }
  .lb-rank { font-size: 1.2rem; font-weight: 800; color: var(--text-dim); min-width: 32px; text-align: center; }
  .lb-rank.top1 { color: var(--accent); } .lb-rank.top2 { color: var(--cyan); } .lb-rank.top3 { color: var(--purple); }
  .lb-info { flex: 1; }
  .lb-name { font-weight: 600; font-size: 1rem; }
  .lb-release-date { font-size: 0.72rem; color: var(--text-dim); margin-top: 1px; }
  .lb-meta { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .lb-score { font-size: 1.1rem; font-weight: 700; color: var(--green); text-align: right; }
  .lb-rating { font-size: 0.85rem; color: var(--accent); }
  .lb-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); }

  /* 3-tier Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; overflow-x: auto; }
  .tab {
    padding: 10px 16px; border-radius: 10px 10px 0 0; cursor: pointer;
    font-size: 0.82rem; font-weight: 600; white-space: nowrap; min-height: 44px;
    border: 1px solid var(--border); border-bottom: none;
    background: var(--surface); color: var(--text-dim); transition: all 0.2s; flex: 1; text-align: center;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); background: var(--surface2); border-color: var(--cyan); box-shadow: inset 0 2px 0 var(--cyan); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Spoiler banners */
  .spoiler-banner {
    padding: 10px 14px; border-radius: 8px; margin-bottom: 16px;
    font-size: 0.82rem; display: flex; align-items: center; gap: 8px;
  }
  .spoiler-banner.none { background: rgba(63,185,80,0.08); border: 1px solid rgba(63,185,80,0.2); color: var(--green); }
  .spoiler-banner.mild { background: rgba(210,153,34,0.08); border: 1px solid rgba(210,153,34,0.2); color: var(--yellow); }
  .spoiler-banner.full { background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.3); color: var(--red); }

  /* Sentiment bar */
  .sentiment-bar { display: flex; height: 28px; border-radius: 6px; overflow: hidden; margin: 8px 0; }
  .sentiment-bar .seg { display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: #fff; }
  .sentiment-bar .pos { background: var(--green); }
  .sentiment-bar .neg { background: var(--red); }
  .sentiment-bar .mix { background: var(--yellow); }
  .sentiment-bar .neu { background: #484f58; }
  .sentiment-labels { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px; margin-top: 4px; font-size: 0.78rem; }
  .sentiment-labels .pos { color: var(--green); } .sentiment-labels .neg { color: var(--red); }
  .sentiment-labels .mix { color: var(--yellow); } .sentiment-labels .neu { color: var(--text-dim); }

  /* Rating big */
  .rating-hero { display: flex; align-items: center; gap: 16px; }
  .rating-num { font-size: 3rem; font-weight: 800; color: var(--accent); line-height: 1; }
  .rating-stars { font-size: 1.2rem; letter-spacing: 2px; color: var(--accent); }
  .rating-label { font-size: 0.82rem; color: var(--text-dim); }

  /* Theme pills */
  .theme-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 5px 12px; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; }
  .pill .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .pill .dot.vh { background: var(--green); } .pill .dot.hi { background: var(--cyan); }
  .pill .dot.md { background: var(--yellow); } .pill .dot.lo { background: var(--text-dim); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .col ul { list-style: none; }
  .col ul li { padding: 6px 0; font-size: 0.85rem; display: flex; align-items: flex-start; gap: 8px; border-bottom: 1px solid var(--border); }
  .col ul li:last-child { border: none; }
  .col ul li::before { content: "\2705"; flex-shrink: 0; }
  .col.criticize ul li::before { content: "\274c"; }

  .source-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; min-height: 44px; }
  .source-item:last-child { border: none; }
  .source-item a { color: var(--cyan); text-decoration: none; }
  .source-item .count { color: var(--text-dim); font-size: 0.75rem; margin-left: auto; white-space: nowrap; }

  .genres { display: flex; gap: 6px; flex-wrap: wrap; }
  .genres span { background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.25); color: var(--cyan); padding: 3px 10px; border-radius: 12px; font-size: 0.78rem; }

  .buzz-badge { display: inline-block; padding: 4px 12px; border-radius: 16px; font-size: 0.78rem; font-weight: 600; }
  .buzz-explosive { background: rgba(240,136,62,0.2); color: var(--accent); border: 1px solid var(--accent); }
  .buzz-very-high { background: rgba(188,140,255,0.15); color: var(--purple); border: 1px solid var(--purple); }
  .buzz-high { background: rgba(88,166,255,0.12); color: var(--cyan); border: 1px solid var(--cyan); }
  .buzz-medium { background: rgba(210,153,34,0.1); color: var(--yellow); border: 1px solid var(--yellow); }
  .buzz-low { background: rgba(139,148,158,0.1); color: var(--text-dim); border: 1px solid var(--border); }
  .buzz-muted { background: rgba(139,148,158,0.05); color: var(--text-dim); border: 1px dashed var(--border); font-style: italic; }

  .loading { text-align: center; padding: 80px 20px; color: var(--text-dim); }
  .loading .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: var(--red); text-align: center; padding: 40px; }

  .summary-text { font-size: 0.92rem; line-height: 1.7; }
  .vibe-block { background: var(--surface2); border-radius: 8px; padding: 14px; margin: 8px 0; border-left: 3px solid var(--cyan); }

  .footer { text-align: center; padding: 24px; color: var(--text-dim); font-size: 0.72rem; opacity: 0.7; }

  @media (max-width: 600px) {
    .container { padding: 12px; }
    .two-col { grid-template-columns: 1fr; }
    .rating-num { font-size: 2.2rem; }
    .tabs { flex-wrap: nowrap; }
    .tab { font-size: 0.75rem; padding: 8px 10px; min-height: 44px; }
    .lb-row { min-height: 44px; padding: 12px; }
    .back { min-height: 44px; padding: 10px 16px; }
    .theme-toggle { top: 12px; right: 12px; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading"><div class="spinner"></div><div>Loading...</div></div>
</div>

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>

<script>
// ─── Theme ───────────────────────────────────────────────────────────
function initTheme() {
  const stored = localStorage.getItem('theme');
  if (stored) {
    document.documentElement.setAttribute('data-theme', stored);
  } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
  updateThemeButton();
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeButton();
}

function updateThemeButton() {
  const btn = document.getElementById('themeToggle');
  if (!btn) return;
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  btn.textContent = isDark ? '☀️' : '🌙';
}

initTheme();

// ─── Config ─────────────────────────────────────────────────────────
const VPS_IP = "__VITE_VPS_IP__";
const TUNNEL_URL = "https://movies.onekural.com";
// On HTTPS pages (Vercel), use the tunnel URL immediately (synchronous)
// On HTTP pages (VPS direct), API_BASE stays "" for same-origin calls
let API_BASE = window.location.protocol === 'https:' ? TUNNEL_URL : "";
const API_KEY  = "__VITE_API_KEY__";
const API_HEADERS = { "X-API-Key": API_KEY };

// Auto-discover tunnel URL (non-blocking, updates API_BASE if found)
(async function discoverTunnel() {
  try {
    const r = await fetch(`${VPS_IP}/api/tunnel-url`, { signal: AbortSignal.timeout(5000) });
    const data = await r.json();
    if (data.url) API_BASE = data.url;
  } catch(e) {
    // mixed content from HTTPS page — fallback already set above
  }
})();

function route() {
  const hash = window.location.hash || '#/';
  if (hash.startsWith('#/film/')) {
    const film = decodeURIComponent(hash.replace('#/film/', ''));
    showFilm(film);
  } else if (hash.startsWith('#/trailer/')) {
    const film = decodeURIComponent(hash.replace('#/trailer/', ''));
    showTrailerDetail(film);
  } else {
    showLeaderboard();
  }
}

window.addEventListener('hashchange', route);

// ─── Helpers ─────────────────────────────────────────────────────────
function esc(s) { if (!s) return ''; return String(s).replace(/[&<>"']/g, function(m) {
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; }); }

function short_mood(mood) {
  if (!mood) return '';
  const m = mood.toLowerCase();
  const map = [
    ['celebratory', 'Celebratory'], ['blockbuster', 'Blockbuster'], ['explosive', 'Explosive'],
    ['divisive', 'Divisive'], ['polarizing', 'Polarizing'], ['disappointed', 'Disappointed'],
    ['underwhelming', 'Underwhelming'], ['mixed bag', 'Mixed Bag'], ['mixed', 'Mixed'],
    ['tepid', 'Tepid'], ['muted', 'Muted'], ['enthusiastic', 'Enthusiastic'],
    ['ecstatic', 'Ecstatic'], ['thrilled', 'Thrilled'], ['cautiously', 'Cautious Hope'],
    ['optimistic', 'Optimistic'], ['strongly positive', 'Raving'], ['mostly positive', 'Mostly Positive'],
    ['positive', 'Positive'], ['negative', 'Poor Reception'], ['excited', 'High Expectations'],
    ['boring', 'Boring'], ['average', 'Average'], ['loved', 'Fan Favorite'],
    ['praised', 'Praised'], ['solid', 'Solid'], ['decent', 'Decent'],
    ['outstanding', 'Outstanding'], ['fantastic', 'Fantastic'], ['brilliant', 'Brilliant'],
    ['gripping', 'Gripping'], ['refreshing', 'Refreshing'], ['intense', 'Intense'],
  ];
  for (const [key, label] of map) {
    if (m.includes(key)) return label;
  }
  // Fallback: take first 3-4 words
  const words = mood.split(/\s+/).slice(0, 4);
  return words.join(' ');
}

function buzzClass(level) {
  const map = {'explosive':'explosive','very high':'very-high','high':'high','medium':'medium','low':'low','muted':'muted',
    'celebratory':'explosive','excited':'very-high','cautiously optimistic':'high','mixed':'medium',
    'polarizing':'high','disappointed':'low','surprised':'high','divisive':'medium','anticipated':'medium',
    'mind blowing':'explosive','mind-blowing':'explosive','mass hype':'explosive','mass':'explosive',
    'raving':'explosive','blockbuster':'explosive','explosive':'explosive','electric':'explosive',
    'ecstatic':'explosive','thrilled':'explosive','outstanding':'explosive','fantastic':'explosive',
    'brilliant':'explosive','stunning':'explosive','masterful':'explosive','superb':'explosive',
    'audience favorite':'explosive','joyful':'explosive','heartwarming':'explosive',
    'high expectations':'very-high','highly praised':'very-high','impressive':'very-high',
    'solid expectations':'very-high','solid':'very-high','outstanding reception':'very-high',
    'gripping':'very-high','intense':'very-high','refreshing':'very-high',
    'well received':'high','positive buzz':'high','strongly positive':'high','enthusiastic':'high',
    'appreciated':'high','good buzz':'high','optimistic':'high','excitement':'high','hype':'high',
    'cautiously optimistic':'high','optimistic outlook':'high','fairly good':'high',
    'mixed bag':'medium','average buzz':'medium','decent':'medium',
    'passable':'medium','moderate':'medium','mediocre':'medium','so-so':'medium',
    'underwhelming':'low','disappointing':'low','tepid reception':'low','found boring':'low',
    'muted response':'low','poor reception':'low','below average':'low','lukewarm':'low',
    'lackluster':'low','poor':'low',
    'muted':'muted','no buzz':'muted'};
  return 'buzz-' + (map[String(level).toLowerCase()] || 'medium');
}

function freqDot(f) {
  const map = {'very high':'vh','high':'hi','medium':'md','low':'lo'};
  return map[String(f || '').toLowerCase()] || 'md';
}

// ─── Leaderboard ─────────────────────────────────────────────────────
async function showLeaderboard() {
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading...</div></div>';
  try {
    const [lbRes, nrRes, tlRes] = await Promise.all([
      fetch(`${API_BASE}/api/leaderboard`, { headers: API_HEADERS }),
      fetch(`${API_BASE}/api/new-releases`, { headers: API_HEADERS }),
      fetch(`${API_BASE}/api/trailer-leaderboard`, { headers: API_HEADERS }),
    ]);
    const films = await lbRes.json();
    const newReleases = await nrRes.json();
    const trailers = await tlRes.json();
    renderDashboard(films, newReleases, trailers);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="error-msg">⚠️ ${esc(e.message)}</div>`;
  }
}

function renderDashboard(films, newReleases, trailers) {
  if ((!films || films.length === 0) && (!newReleases || newReleases.length === 0)) {
    document.getElementById('app').innerHTML = '<div class="error-msg">No films tracked yet.</div>';
    return;
  }

  let html = `
    <div class="header">
      <h1>🎬 Kollywood Pulse</h1>
      <div class="sub">Social media review dashboard — Top films by public discussion</div>
    </div>
  `;

  // ── SECTION 1: THEATRICAL LEADERBOARD ─────────────────────────
  html += `<div class="card" style="padding:8px">`;
  if (films && films.length > 0) {
    html += `<div class="lb-header"><span class="lb-header-label">Rank</span><span></span><span class="lb-header-label" style="text-align:right">Score</span></div>`;
    films.forEach((f, i) => {
      const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
      const buzz = f.buzz || '';
      const buzzHtml = buzz ? `<span class="buzz-badge ${buzzClass(buzz)}">${esc(buzz)}</span>` : '';
      const genreHtml = (f.genre || []).map(g => `<span class="lb-tag">${esc(g)}</span>`).join(' ');
      const releaseDateHtml = f.release_date ? `<div class="lb-release-date">${esc(f.release_date)}</div>` : '';

      html += `
        <div class="lb-row" onclick="window.location.hash='#/film/${encodeURIComponent(f.film)}'">
          <div class="lb-rank ${rankClass}">${i + 1}</div>
          <div class="lb-info">
            <div class="lb-name">${esc(f.film)}</div>
            ${releaseDateHtml}
            <div class="lb-meta">
              ${buzzHtml}
              ${genreHtml}
              <span>💬 ${f.total_comments || 0}</span>
            </div>
          </div>
          <div class="lb-score">${f.popularity_score || 0}</div>
        </div>
      `;
    });
  } else {
    html += `<p style="color:var(--text-dim);text-align:center;padding:20px">No films on leaderboard right now.</p>`;
  }
  html += `</div>`;

  // ── SECTION 2: NEW RELEASES (only if any) ─────────────────────
  if (newReleases && newReleases.length > 0) {
    html += `
      <div class="section-divider"><span class="icon">⭐</span> New Releases <span class="icon">⭐</span></div>
      <p style="font-size:0.82rem;color:var(--text-dim);margin:-8px 0 14px">Freshly released — gathering audience reactions</p>
      <div class="card" style="padding:8px">
    `;
    newReleases.forEach((f, i) => {
      const buzz = f.buzz || '';
      const buzzHtml = buzz ? `<span class="buzz-badge ${buzzClass(buzz)}">${esc(buzz)}</span>` : '';
      const ratingHtml = f.rating ? `<span class="lb-rating">⭐ ${f.rating}</span>` : '';
      const hypeHtml = `<span class="lb-tag" style="border-color:var(--accent);color:var(--accent)">🔥 ${f.hype_score || '—'}</span>`;
      const vibeHtml = f.vibe ? `<span style="font-size:0.78rem;color:var(--text-dim);font-style:italic">${esc(f.vibe)}</span>` : '';

      html += `
        <div class="lb-row" onclick="window.location.hash='#/film/${encodeURIComponent(f.film)}'">
          <div class="lb-rank">#</div>
          <div class="lb-info">
            <div class="lb-name">${esc(f.film)}</div>
            <div class="lb-meta">
              ${ratingHtml}
              ${buzzHtml}
              ${hypeHtml}
              <span>💬 ${f.total_comments || 0}</span>
              <span class="lb-tag" style="border-color:var(--accent);color:var(--accent)">NEW</span>
            </div>
            ${vibeHtml}
          </div>
          <div class="lb-score">—</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  // ── SECTION 3: TRAILER LEADERBOARD ────────────────────────
  if (trailers && trailers.length > 0) {
    html += `
      <div class="section-divider"><span class="icon">🎬</span> Upcoming — Trailer Hype <span class="icon">🎬</span></div>
      <p style="font-size:0.82rem;color:var(--text-dim);margin:-8px 0 14px">Most anticipated Tamil films by trailer buzz</p>
      <div class="card" style="padding:8px">
    `;
    html += `<div class="lb-header"><span class="lb-header-label">Rank</span><span></span><span class="lb-header-label" style="text-align:right">Hype</span></div>`;
    trailers.forEach((t, i) => {
      const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
      const viewsStr = t.total_views >= 1000000 ? `${(t.total_views/1000000).toFixed(1)}M` : t.total_views >= 1000 ? `${(t.total_views/1000).toFixed(0)}K` : t.total_views;
      const category = t.category || t.sentiment || 'Anticipated';
      const catEmoji = {'Celebratory':'🎉','Excited':'🔥','Cautiously Optimistic':'🤞','Mixed':'🤔','Polarizing':'⚡','Disappointed':'😔','Surprised':'😮','Divisive':'💔','Anticipated':'🎬','Muted':'😶'}[category] || '';
      const ratingLabel = t.rating_label || category;
      const taglineHtml = t.tagline ? `<div style="font-size:0.75rem;color:var(--text-dim);margin-top:2px;font-style:italic">${esc(t.tagline)}</div>` : '';
      const genreHtml = t.genre_phrase ? `<div style="font-size:0.73rem;color:var(--text-dim);margin-top:1px;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.genre_phrase)}</div>` : '';

      html += `
        <div class="lb-row" onclick="window.location.hash='#/trailer/${encodeURIComponent(t.film)}'">
          <div class="lb-rank ${rankClass}">${i + 1}</div>
          <div class="lb-info">
            <div class="lb-name">${esc(t.film)}</div>
            ${taglineHtml}
            <div class="lb-meta">
              <span class="buzz-badge ${buzzClass(ratingLabel)}">${esc(ratingLabel)}</span>
              <span>👁 ${viewsStr}</span>
            </div>
            ${genreHtml}
          </div>
          <div class="lb-score" style="color:var(--accent)">${t.hype_score || 0}</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  html += `
    <div class="footer">
      Data refreshes every 6 hours · Powered by YouTube API + OpenRouter
      <br><span style="font-size:0.7rem;color:var(--text-dim)">Click any film for detailed analysis</span>
    </div>`;

  document.getElementById('app').innerHTML = html;
  updateThemeButton();
}

// ─── Film Detail ─────────────────────────────────────────────────────
async function showFilm(film) {
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading analysis...</div></div>';
  try {
    const r = await fetch(`${API_BASE}/api/film/${encodeURIComponent(film)}`, { headers: API_HEADERS });
    const data = await r.json();
    renderFilm(film, data);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="error-msg">⚠️ ${esc(e.message)}</div>`;
  }
}

function renderFilm(film, data) {

  const sb = a.sentiment_breakdown || {};

  const total = data.total_comments || 0;
  const videos = data.videos || [];
  const rating = a.rating || '—';

  const stars = "★".repeat(Math.min(10, Math.floor(rating))) + "☆".repeat(Math.max(0, 10 - Math.floor(rating)));
  const raw_mood = tab0.audience_mood || '';

  const buzzHtml = buzz ? `<span class="buzz-badge ${buzzClass(buzz)}">${esc(buzz)}</span>` : '';

  const themeHtml = (a.top_themes || []).slice(0, 5).map(t => {
    if (typeof t === 'string') return `<span class="pill">${esc(t)}</span>`;
    return `<span class="pill"><span class="dot ${freqDot(t.frequency)}"></span>${esc(t.theme)} ${t.sentiment === 'positive' ? '😊' : t.sentiment === 'negative' ? '😠' : '🤔'}</span>`;
  }).join('');

  const lovedHtml = (a.what_people_loved || []).filter(l => l && l.trim()).slice(0, 5).map(l => `<li>${esc(l)}</li>`).join('');

  const videoHtml = videos.map(v =>

  const genreHtml = [...new Set((a.genre || []).filter(g => g !== 'Unknown'))].slice(0, 2).map(g => `<span style="color:var(--text-dim)">${esc(g)}</span>`).join(' · ');

  // Comparisons
  const comps = a.audience_engagement?.comparisons || [];

  // ─── THEATRICAL MODE: 3-tier spoiler tabs ────────────────────

    <div class="card" style="padding:12px 16px;margin-bottom:12px">

        ${data.director ? `<div><span style="color:var(--text-dim);font-weight:600">Director:</span> ${esc(data.director)}</div>` : ''}
        ${data.cast ? `<div><span style="color:var(--text-dim);font-weight:600">Cast:</span> ${esc(data.cast)}</div>` : ''}
        ${data.music ? `<div><span style="color:var(--text-dim);font-weight:600">Music:</span> ${esc(data.music)}</div>` : ''}

      </div>
    </div>` : ''}

      <div class="card">

        ${tab0.audience_mood ? `<div style="margin-top:8px">Mood: <span class="buzz-badge ${buzzClass(tab0.audience_mood)}">${esc(tab0.audience_mood)}</span></div>` : ''}

      </div>

      </div>

      ${tab0.technical_highlights ? `

          ${(Array.isArray(tab2.audience_reaction_highlights) ? tab2.audience_reaction_highlights : [tab2.audience_reaction_highlights]).map(s => `<li style="padding:8px 0;font-size:0.85rem;border-bottom:1px solid var(--border)">💬 ${esc(s)}</li>`).join('')}

    <div class="footer">

// ─── Trailer Detail ──────────────────────────────────────────────────
async function showTrailerDetail(film) {

  try {
    const r = await fetch(`${API_BASE}/api/trailer/${encodeURIComponent(film)}`, { headers: API_HEADERS });

    const data = await r.json();
    renderTrailerDetail(film, data);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="error-msg">⚠️ ${esc(e.message)}</div>`;
  }
}

function renderTrailerDetail(film, data) {

    `<div class="source-item">

      <span class="count">${v.comment_count || 0} comments</span>
    </div>`
  ).join('');

  const themeHtml = (a.top_themes || []).slice(0, 5).map(t => {

    return `<span class="pill"><span class="dot ${freqDot(t.frequency)}"></span>${esc(t.theme)} ${t.sentiment === 'positive' ? '😊' : t.sentiment === 'negative' ? '😠' : '🤔'}</span>`;
  }).join('');

  const lovedHtml = (a.what_people_loved || []).filter(l => l && l.trim()).slice(0, 5).map(l => `<li>${esc(l)}</li>`).join('');

        <div>

    <!-- Sentiment -->

// ─── Tab Switcher ───────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const tab = document.getElementById('tab-' + name);
  if (tab) tab.classList.add('active');
}
